<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" type="image/x-icon" href="images/N - logo 1.png">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Entrar — ECONEXUS</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="header">
  <div class="container nav">
   <img src="images/N - logo 1.png" width="80px" alt="ECONEXUS" />
    <div class="nav-actions">
      <button class="icon-btn" onclick="toggleTheme()"><span class="theme-icon">🌙</span></button>
      <a href="register.html" class="btn btn-ghost">Cadastrar</a>
    </div>
  </div>
</header>

<main class="auth-wrap">
  <div class="auth-card reveal in">
    <img src="images/econexus.png" width="280px" alt="ECONEXUS" style="margin: 0 auto; display: block;" />
    <p class="sub">Acesse sua Calculadora de Carbono</p>
    <div id="msg" class="msg"></div>
    <form onsubmit="return handleLogin(event)">
      <div class="field"><label>E-mail</label><input name="email" type="email" placeholder="Seu E-mail" required></div>
      <div class="field"><label>Senha</label><input name="pwd" type="password" placeholder="Sua Senha" required></div>
      <div class="field-row">
        <label style="display:flex;gap:6px;align-items:center"><input type="checkbox"> Lembrar senha</label>
        <a href="#">Esqueci minha senha</a>
      </div>
      <button class="btn btn-primary btn-lg btn-block" type="submit">Entrar →</button>
    </form>
    <p class="alt">Não tem conta? <a href="register.html">Criar agora</a></p>
  </div>
</main>
<script src="js/script.js"></script>
</body>
</html>
